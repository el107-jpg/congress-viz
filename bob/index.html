<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="description" content="Congressional co-sponsorship visualization">
	<title>Congressional Co-sponsorship MDS</title>
	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
	<!-- Custom styling -->
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div id="main-wrapper">
		<div id="visualization-area">
			<!-- controls get inserted here by JS -->
			<div id="chart"></div>
		</div>
		<div id="side-panels-container">
			<div id="member-panel" class="side-panel">
				<div class="panel-header">
					<h3 id="member-panel-title">Member Details</h3>
					<button id="member-panel-close" class="close-btn">&times;</button>
				</div>
				<div id="member-panel-content"></div>
			</div>
			<div id="bill-panel" class="side-panel">
				<div class="panel-header">
					<h3 id="bill-panel-title">Bill Details</h3>
					<button id="bill-panel-close" class="close-btn">&times;</button>
				</div>
				<div id="bill-panel-content"></div>
			</div>
		</div>
	</div>
	<script type="module" src="js/main.js"></script>
</body>
</html>
